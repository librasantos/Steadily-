<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"/>
  <meta name="theme-color" content="#F5F3EF"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Steadily"/>
  <title>Steadily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F3EF;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overscroll-behavior: none;
    }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    input, textarea { font-size: 16px !important; } /* prevents iOS zoom */

    @keyframes breathe {
      0%,100% { transform: scale(1); opacity:.4; }
      50% { transform: scale(1.18); opacity:.95; }
    }
    @keyframes foxWag {
      0%,100% { transform: rotate(0deg); }
      25% { transform: rotate(8deg); }
      75% { transform: rotate(-8deg); }
    }
    @keyframes foxBounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes pop {
      0%   { transform:scale(.88); opacity:0; }
      65%  { transform:scale(1.04); opacity:1; }
      100% { transform:scale(1); opacity:1; }
    }
    @keyframes pulse {
      0%,100% { opacity:.4; transform:scale(.88); }
      50%      { opacity:1;  transform:scale(1.12); }
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity:0; }
    }
    @keyframes winPop {
      0%   { transform:scale(.8); opacity:0; }
      60%  { transform:scale(1.08); opacity:1; }
      100% { transform:scale(1); opacity:1; }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── CONSTANTS ──────────────────────────────────────────────────
const ENERGY = {
  low:  { emoji:"🌧", label:"Low",  color:"#7B9EA8", bg:"#EEF4F6", max:1, hint:"Maybe just one thing today." },
  okay: { emoji:"🌿", label:"Okay", color:"#5A8A6E", bg:"#EEF5F1", max:2, hint:"Let's keep it to 2–3." },
  good: { emoji:"☀️", label:"Good", color:"#C4893A", bg:"#FBF4EA", max:3, hint:"Choose up to 3 that matter most." },
};

const PRIORITIES = [
  { key:"must",    label:"Must do",     color:"#E05C5C", bg:"#FDEAEA" },
  { key:"should",  label:"Should do",   color:"#C4893A", bg:"#FBF4EA" },
  { key:"nice",    label:"Nice to have",color:"#5A8A6E", bg:"#EEF5F1" },
  { key:"later",   label:"Not urgent",  color:"#9B9B9B", bg:"#F4F4F4" },
];

const TIMERS = [
  { label:"5 min",  secs:300,  sub:"Stolen moment" },
  { label:"10 min", secs:600,  sub:"Solid chunk" },
  { label:"25 min", secs:1500, sub:"Full block" },
];

const SOUNDS = [
  { key:"rain",  label:"🌧 Rain",        url:"https://cdn.pixabay.com/audio/2022/03/10/audio_1e695af41d.mp3" },
  { key:"ocean", label:"🌊 Ocean",       url:"https://cdn.pixabay.com/audio/2022/03/15/audio_8cb3d2c1c9.mp3" },
  { key:"white", label:"🤍 White noise", url:"https://cdn.pixabay.com/audio/2024/02/28/audio_0a9a3adefe.mp3" },
  { key:"brown", label:"🟤 Brown noise", url:"https://cdn.pixabay.com/audio/2023/10/08/audio_cf959dee0f.mp3" },
  { key:"lofi",  label:"🎵 Lo-fi",       url:"https://cdn.pixabay.com/audio/2024/11/26/audio_f37bf0f0ba.mp3" },
  { key:"none",  label:"🔇 None",        url:null },
];

const WINS = ["That counts.","You did it.","One down.","That's real work.","Well done."];
const GROUNDS = ["Take one breath.","Feel your feet.","Roll your shoulders.","Unclench your jaw."];
const OPEN_MSGS = ["You're here. That's already something.","Showing up is the first step.","No rush. You arrived.","Just being here counts."];
const BREAKDOWN_TIPS = [
  "Start with the first physical action — not a goal, an action.",
  "What would you do in the first 5 minutes? Start there.",
  "If finishing feels heavy, just focus on starting.",
  "Break it until each step takes less than 15 minutes.",
  "The smallest step that moves this forward — what is it?",
];

const CONFETTI_COLORS = ["#E05C5C","#C4893A","#5A8A6E","#7B9EA8","#9B7EC8","#E08B6A","#A8C5A0"];

const PRIORITY_ORDER = { must:0, should:1, nice:2, later:3 };

// ── STORAGE ────────────────────────────────────────────────────
const SK = "steadily_v3";
const DK = "steadily_dump_v2";
const TODAY = new Date().toDateString();
const sv = d => { try { localStorage.setItem(SK, JSON.stringify({...d, _date: TODAY})); } catch(e){} };
const ld = () => {
  try {
    const raw = localStorage.getItem(SK);
    if(!raw) return null;
    const d = JSON.parse(raw);
    if(d._date !== TODAY) { localStorage.removeItem(SK); return null; }
    return d;
  } catch(e){ return null; }
};
const cl = () => { try { localStorage.removeItem(SK); } catch(e){} };
const sdump = items => { try { localStorage.setItem(DK, JSON.stringify(items)); } catch(e){} };
const ldump = () => { try { const d = localStorage.getItem(DK); return d?JSON.parse(d):[]; } catch(e){return [];} };

// ── SOUND ──────────────────────────────────────────────────────
let _audio = null;
const stopSound = () => { if(_audio){_audio.pause();_audio.src="";_audio=null;} };
const playSound = url => {
  stopSound();
  if(!url) return;
  _audio = new Audio(url);
  _audio.loop = true;
  _audio.volume = 0.3;
  const p = _audio.play();
  if(p && p.catch) p.catch(()=>{});
};
const resumeSound = () => { if(_audio && _audio.paused) { const p=_audio.play(); if(p&&p.catch)p.catch(()=>{}); } };
const pauseSound = () => { if(_audio && !_audio.paused) _audio.pause(); };

// ── CONFETTI ───────────────────────────────────────────────────
const fireConfetti = () => {
  const count = 40;
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100+'vw';
      el.style.top = '-20px';
      el.style.background = CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)];
      el.style.width = (8+Math.random()*8)+'px';
      el.style.height = (8+Math.random()*8)+'px';
      el.style.animationDuration = (1.5+Math.random()*2)+'s';
      el.style.animationDelay = '0s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 4000);
    }, i*40);
  }
};

// ── NOTIFICATIONS ─────────────────────────────────────────────
const askNotif = async () => {
  if(typeof Notification==="undefined") return false;
  if(Notification.permission==="granted") return true;
  const r = await Notification.requestPermission();
  return r==="granted";
};
const notify = (title, body, delay=100) => {
  if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
  setTimeout(()=>{ try{new Notification(title,{body});}catch(e){} }, delay);
};

// ── DOLPHIN SVG COMPANION ─────────────────────────────────────
function Fox({ mood="idle", size=100 }) {
  // Named Fox for compatibility but renders a dolphin
  const bodyAnim = mood==="happy" ? "foxBounce 0.55s ease-in-out infinite" : "none";
  const tailAnim = mood==="happy" ? "foxWag 0.5s ease-in-out infinite" : "foxWag 3s ease-in-out infinite";
  const blue1 = "#5B9EC9";
  const blue2 = "#3A7BA8";
  const belly = "#D6EEF8";
  return (
    <div style={{width:size,height:size,margin:"0 auto",position:"relative",animation:bodyAnim}}>
      <svg viewBox="0 0 120 120" width={size} height={size}>
        {/* Tail fluke */}
        <g style={{transformOrigin:"22px 72px", animation:tailAnim}}>
          <path d="M22 72 Q8 62 4 52 Q14 58 22 72Z" fill={blue2}/>
          <path d="M22 72 Q8 82 4 92 Q14 82 22 72Z" fill={blue2}/>
        </g>
        {/* Body */}
        <ellipse cx="68" cy="72" rx="46" ry="22" fill={blue1}/>
        {/* Belly */}
        <ellipse cx="72" cy="76" rx="32" ry="13" fill={belly}/>
        {/* Dorsal fin */}
        <path d="M65 52 Q72 30 82 38 Q78 52 70 54Z" fill={blue2}/>
        {/* Pectoral fin */}
        <path d="M80 78 Q95 88 98 80 Q90 72 80 74Z" fill={blue2} opacity="0.85"/>
        {/* Head */}
        <ellipse cx="102" cy="66" rx="18" ry="16" fill={blue1}/>
        {/* Snout / beak */}
        <path d="M116 64 Q126 66 116 70 Q112 68 116 64Z" fill={blue1}/>
        {/* Eye */}
        <circle cx="110" cy="61" r="4" fill="#1A3D5C"/>
        <circle cx="111.2" cy="59.8" r="1.4" fill="white"/>
        {/* Smile */}
        {mood==="happy"
          ? <path d="M112 68 Q116 73 120 68" fill="none" stroke="#1A3D5C" strokeWidth="1.8" strokeLinecap="round"/>
          : <path d="M113 68 Q116 71 119 68" fill="none" stroke="#1A3D5C" strokeWidth="1.4" strokeLinecap="round"/>
        }
        {/* Blowhole */}
        <ellipse cx="100" cy="52" rx="3" ry="2" fill={blue2} opacity="0.7"/>
        {/* Happy cheek glow */}
        {mood==="happy" && <>
          <ellipse cx="107" cy="65" rx="5" ry="3" fill="#A8D8F0" opacity="0.5"/>
          {/* Splash drops */}
          <circle cx="98" cy="44" r="2" fill="#A8D8F0" opacity="0.7"/>
          <circle cx="103" cy="40" r="1.5" fill="#A8D8F0" opacity="0.6"/>
          <circle cx="94" cy="41" r="1.2" fill="#A8D8F0" opacity="0.5"/>
        </>}
        {/* Water line shimmer — idle */}
        {mood!=="happy" && <ellipse cx="68" cy="90" rx="44" ry="4" fill="#A8D8F0" opacity="0.2"/>}
      </svg>
    </div>
  );
}

// ── CIRCLE TIMER ───────────────────────────────────────────────
function CircleTimer({ seconds, total, color, done }) {
  const r=52, circ=2*Math.PI*r;
  const offset = circ*(1-seconds/total);
  const m = String(Math.floor(seconds/60)).padStart(2,"0");
  const s = String(seconds%60).padStart(2,"0");
  return (
    <div style={{position:"relative",width:130,height:130,margin:"0 auto 16px"}}>
      <svg width="130" height="130" style={{transform:"rotate(-90deg)"}}>
        <circle cx="65" cy="65" r={r} fill="none" stroke="#ECEAE6" strokeWidth="5"/>
        <circle cx="65" cy="65" r={r} fill="none" stroke={done?"#A8C5A0":color} strokeWidth="5"
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{transition:"stroke-dashoffset 1s linear"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontFamily:"'Lora',serif",fontSize:"clamp(20px,5vw,26px)",color:done?"#A8C5A0":"#1C1C1C",letterSpacing:"-1px"}}>{m}:{s}</span>
      </div>
    </div>
  );
}

// ── PRIORITY BADGE ─────────────────────────────────────────────
function PriBadge({ pkey, small }) {
  const p = PRIORITIES.find(x=>x.key===pkey)||PRIORITIES[3];
  return (
    <span style={{fontSize:small?"10px":"11px",padding:small?"2px 7px":"3px 9px",borderRadius:"50px",background:p.bg,color:p.color,fontWeight:"500",whiteSpace:"nowrap"}}>
      {p.label}
    </span>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────
function Steadily() {
  // Entry
  const [phase, setPhase]       = useState("open");
  const [openMsg]               = useState(()=>OPEN_MSGS[Math.floor(Math.random()*OPEN_MSGS.length)]);
  const [showSkip, setShowSkip] = useState(false);
  const [saved, setSaved]       = useState(null);
  const [foxMood, setFoxMood]   = useState("idle");

  // Energy
  const [energy, setEnergy]     = useState(null);

  // Brain dump
  const [dumpText, setDumpText] = useState("");
  const [dumpItems, setDumpItems] = useState(()=>ldump()); // persistent { id, text, priority }
  const [dumpParsed, setDumpParsed] = useState([]); // from session dump
  const [dumpOpen, setDumpOpen] = useState(false);
  const [dumpInput, setDumpInput] = useState("");

  // Task selection
  const [allTasks, setAllTasks]   = useState([]); // full queue { id, text, priority, recur? }
  const [activeTasks, setActiveTasks] = useState([]); // up to 3 working
  const [taskInput, setTaskInput] = useState("");
  const [taskPri, setTaskPri]     = useState("should");
  const [doneTasks, setDoneTasks] = useState([]);

  // Subtasks
  const [subtasks, setSubtasks]   = useState([]);
  const [subInput, setSubInput]   = useState("");
  const [subGroup, setSubGroup]   = useState(null); // {total, current}
  const [subTip, setSubTip]       = useState("");

  // Defer
  const [deferDate, setDeferDate] = useState("");
  const [deferred, setDeferred]   = useState([]);

  // Timer & sound
  const [timer, setTimer]         = useState(null);
  const [secs, setSecs]           = useState(0);
  const [running, setRunning]     = useState(false);
  const [timerDone, setTimerDone] = useState(false);
  const [sound, setSound]         = useState(null);
  const [soundOn, setSoundOn]     = useState(false);
  const [notifAsked, setNotifAsked] = useState(false);

  // Break
  const [breakSecs, setBreakSecs] = useState(0);
  const [breakRun, setBreakRun]   = useState(false);

  // Mode
  const [mode, setMode]           = useState(null);
  const [addMoreInput, setAddMoreInput] = useState("");

  // UI
  const [fade, setFade]           = useState(true);
  const [win, setWin]             = useState(null);

  // Collaborator
  const [collabTask, setCollabTask]   = useState(null); // task being invited on
  const [collabName, setCollabName]   = useState("");
  const [collabEmail, setCollabEmail] = useState("");
  const [collabDue, setCollabDue]     = useState("");
  const [collabTime, setCollabTime]   = useState("");
  const [collabSent, setCollabSent]   = useState(false);
  const [userName, setUserName]       = useState(()=>{ try{return localStorage.getItem("steadily_name")||"";}catch(e){return "";} });

  const tickRef  = useRef(null);
  const breakRef = useRef(null);
  const entryRef = useRef(null);

  const cfg = energy ? ENERGY[energy] : null;
  const c   = cfg?.color || "#5A8A6E";
  const bg  = cfg?.bg    || "#F5F3EF";

  const currentTask = activeTasks[0] || null;
  const pri = currentTask ? PRIORITIES.find(p=>p.key===currentTask.priority)||PRIORITIES[1] : null;
  const focusColor = pri?.color || c;

  // Persist dump
  useEffect(()=>{ sdump(dumpItems); },[dumpItems]);

  // Session save
  useEffect(()=>{
    if(["focus","tasks","select"].includes(phase)) sv({phase,energy,activeTasks,allTasks,doneTasks,deferred,timer});
    if(phase==="done") cl();
  },[phase,activeTasks,allTasks,energy]);

  // Entry sequence
  useEffect(()=>{
    const s = ld();
    if(s?.activeTasks?.length&&s?.energy) setSaved(s);
    setTimeout(()=>setShowSkip(true),1200);
    entryRef.current = setTimeout(()=>setPhase("ready"),3200);
    return ()=>clearTimeout(entryRef.current);
  },[]);

  // Main timer
  useEffect(()=>{
    if(running){
      tickRef.current = setInterval(()=>{
        setSecs(s=>{
          if(s<=1){ clearInterval(tickRef.current); setRunning(false); setTimerDone(true); setMode("posttimer"); notify("Steadily","Focus block done. How are you feeling?"); return 0; }
          return s-1;
        });
      },1000);
    } else clearInterval(tickRef.current);
    return ()=>clearInterval(tickRef.current);
  },[running]);

  // Break timer
  useEffect(()=>{
    if(breakRun){
      breakRef.current = setInterval(()=>{
        setBreakSecs(s=>{
          if(s<=1){ clearInterval(breakRef.current); setBreakRun(false); setMode(null); setSecs(timer?.secs||1500); setTimerDone(false); return 0; }
          return s-1;
        });
      },1000);
    } else clearInterval(breakRef.current);
    return ()=>clearInterval(breakRef.current);
  },[breakRun]);

  // Sound is triggered directly on user tap (Safari requires this)
  // No useEffect for sound

  const go = useCallback((next,delay=0)=>{
    setFade(false);
    setTimeout(()=>{ setPhase(next); setFade(true); },delay+280);
  },[]);

  // ── BRAIN DUMP HELPERS ─────────────────────────────────────
  const parseDump = () => {
    const lines = dumpText.split(/[\n,]+/).map(l=>l.trim()).filter(Boolean);
    const parsed = lines.map((text,i)=>({
      id: Date.now()+i, text,
      priority: "should", // default, user will adjust
    }));
    setDumpParsed(parsed);
    // Also add to persistent dump
    setDumpItems(prev=>[...parsed.map(p=>({...p,id:Date.now()+Math.random()})),...prev]);
    go("dump-review");
  };

  const updateParsedPri = (id, pri) => {
    setDumpParsed(prev=>prev.map(i=>i.id===id?{...i,priority:pri}:i));
  };

  const suggestTasks = () => {
    const max = cfg?.max || 2;
    // Sort by priority, pick top items matching energy
    const sorted = [...dumpParsed].sort((a,b)=>PRIORITY_ORDER[a.priority]-PRIORITY_ORDER[b.priority]);
    return sorted.slice(0,max);
  };

  // ── TASK HELPERS ──────────────────────────────────────────
  const mkId = () => Date.now()+Math.floor(Math.random()*1000);

  const addTask = () => {
    if(!taskInput.trim()) return;
    const task = {id:mkId(), text:taskInput.trim(), priority:taskPri};
    if(activeTasks.length<3) setActiveTasks(p=>[...p,task]);
    else setAllTasks(p=>[...p,task]);
    setTaskInput(""); 
  };

  const removeActive = id => setActiveTasks(p=>p.filter(t=>t.id!==id));

  const promoteFromQueue = task => {
    if(activeTasks.length>=3) return;
    setAllTasks(p=>p.filter(t=>t.id!==task.id));
    setActiveTasks(p=>[...p,task]);
  };

  const promoteFromDump = item => {
    if(activeTasks.length>=3) return;
    const task = {id:mkId(), text:item.text, priority:item.priority||"should"};
    setActiveTasks(p=>[...p,task]);
    setDumpItems(p=>p.filter(i=>i.id!==item.id));
    setDumpOpen(false);
  };

  // ── FOCUS HELPERS ─────────────────────────────────────────
  const startFocus = async () => {
    if(!timer||!activeTasks.length) return;
    if(!notifAsked){ setNotifAsked(true); await askNotif(); }
    setSecs(timer.secs); setRunning(true); setTimerDone(false); setMode(null);
    if(sound?.url){ playSound(sound.url); setSoundOn(true); }
    go("focus");
  };

  const completeTask = () => {
    fireConfetti();
    setFoxMood("happy");
    const msg = WINS[doneTasks.length%WINS.length];
    setWin({ msg, color: pri?.color||c, bg: pri?.bg||"#EEF5F1" });
    clearInterval(tickRef.current); setRunning(false); stopSound(); setSoundOn(false);
    setTimeout(()=>{
      setFoxMood("idle");
      setWin(null);
      const completed = activeTasks[0];
      const rest = activeTasks.slice(1);
      setDoneTasks(p=>[...p,completed]);
      setActiveTasks(rest);
      if(subGroup){ const next=subGroup.current+1; next>subGroup.total?setSubGroup(null):setSubGroup({...subGroup,current:next}); }
      setMode(null); setTimerDone(false);
      if(!rest.length && !allTasks.length){ cl(); setMode("addmore"); setSecs(timer?.secs||1500); return; }
      if(!rest.length && allTasks.length){ setMode("nextup"); return; }
      const g=GROUNDS[Math.floor(Math.random()*GROUNDS.length)];
      setMode("grounding_"+g); setSecs(timer?.secs||1500);
    },2600);
  };

  const confirmBreakdown = () => {
    if(!subtasks.length) return;
    const cat = activeTasks[0]?.priority||"should";
    const newTasks = subtasks.map(t=>({id:mkId(),text:t,priority:cat,_isSubtask:true}));
    setActiveTasks([...newTasks,...activeTasks.slice(1)]);
    setSubGroup({total:subtasks.length,current:1});
    setMode(null); setSubtasks([]); setSubInput("");
    setSecs(timer?.secs||1500); setRunning(true); setTimerDone(false); if(sound?.url&&soundOn)resumeSound();
  };

  const confirmDefer = () => {
    if(!deferDate||!activeTasks[0]) return;
    setDeferred(p=>[...p,{...activeTasks[0],date:deferDate}]);
    const rest=activeTasks.slice(1);
    setActiveTasks(rest); setMode(null); setDeferDate("");
    if(!rest.length&&!allTasks.length){ cl(); go("done"); }
  };

  const resetApp = () => {
    cl(); stopSound();
    setPhase("open"); setEnergy(null); setActiveTasks([]); setAllTasks([]);
    setDoneTasks([]); setDeferred([]); setDeferDate(""); setTimer(null);
    setSecs(0); setRunning(false); setTimerDone(false); setMode(null);
    setSubtasks([]); setSubInput(""); setSubGroup(null); setWin(null);
    setAddMoreInput(""); setDumpText(""); setDumpParsed([]); setDumpInput("");
    setDumpOpen(false); setSound(null); setSoundOn(false); setSaved(null);
    setShowSkip(false); setFoxMood("idle");
    clearInterval(tickRef.current); clearInterval(breakRef.current);
    setTimeout(()=>setShowSkip(true),1200);
    entryRef.current=setTimeout(()=>setPhase("ready"),3200);
  };

  const openCollab = (task) => {
    setCollabTask(task);
    setCollabName(""); setCollabEmail(""); setCollabDue(""); setCollabTime(""); setCollabSent(false);
    setMode("collab");
  };

  const sendCollab = () => {
    if(!collabTask) return;
    const from = userName || "Someone";
    const taskName = collabTask.text;
    const due = collabDue ? new Date(collabDue+"T"+(collabTime||"09:00")).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"}) : "";
    const time = collabTime ? new Date("2000-01-01T"+collabTime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}) : "";
    const dueStr = due ? `\nDue: ${due}${time?" at "+time:""}` : "";
    const greeting = collabName ? `Hey ${collabName}! 👋` : "Hey! 👋";
    const body = `${greeting}\n\n${from} invited you to:\n\n"${taskName}"${dueStr}\n\nOpened with Steadily 🐬`;
    const subject = `${from} invited you to "${taskName}"`;

    // Try Web Share API first (native iOS share sheet)
    if(navigator.share){
      navigator.share({ title: subject, text: body }).then(()=>setCollabSent(true)).catch(()=>{});
    } else {
      // Fallback to mailto
      const mailto = `mailto:${collabEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
      setTimeout(()=>setCollabSent(true), 800);
    }
    // Save name for next time
    try { localStorage.setItem("steadily_name", userName); } catch(e){}
  };

  // ── STYLES ────────────────────────────────────────────────
  const appStyle = {
    minHeight:"100vh", minHeight:"-webkit-fill-available",
    display:"flex", alignItems:"center", justifyContent:"center",
    background:bg, transition:"background 0.7s ease",
    padding:"env(safe-area-inset-top,16px) 20px env(safe-area-inset-bottom,24px)",
  };
  const cardStyle = {
    width:"100%", maxWidth:"min(400px,100%)",
    opacity:fade?1:0, transform:fade?"translateY(0)":"translateY(12px)",
    transition:"opacity 0.28s ease, transform 0.28s ease",
  };
  const T = { fontFamily:"'Lora',serif", fontSize:"clamp(20px,5vw,24px)", fontWeight:"400", color:"#1C1C1C", lineHeight:"1.45", marginBottom:"8px" };
  const SB = { fontSize:"clamp(13px,3.5vw,15px)", fontWeight:"300", color:"#999", marginBottom:"24px", lineHeight:"1.6" };
  const LBL = { fontSize:"10px", letterSpacing:"2px", textTransform:"uppercase", color:"#BBBBBB", fontWeight:"500", marginBottom:"10px", display:"block" };
  const BTN = col=>({ display:"inline-flex", alignItems:"center", justifyContent:"center", padding:"14px 28px", background:col||c, color:"white", border:"none", borderRadius:"50px", fontSize:"clamp(14px,3.5vw,16px)", fontFamily:"'DM Sans',sans-serif", fontWeight:"500", cursor:"pointer", letterSpacing:"0.2px", minHeight:"48px" });
  const GH  = col=>({ display:"inline-flex", alignItems:"center", justifyContent:"center", padding:"12px 22px", background:"transparent", color:col||"#BBBBBB", border:`1.5px solid ${col||"#E0DDD8"}`, borderRadius:"50px", fontSize:"clamp(13px,3.5vw,15px)", fontFamily:"'DM Sans',sans-serif", fontWeight:"300", cursor:"pointer", minHeight:"44px" });
  const INP = { width:"100%", padding:"14px 16px", fontSize:"16px", fontFamily:"'DM Sans',sans-serif", fontWeight:"300", border:"1.5px solid #E8E4DE", borderRadius:"12px", outline:"none", background:"white", color:"#1C1C1C", boxSizing:"border-box", WebkitAppearance:"none" };
  const CARD2 = col=>({ padding:"20px", background:"white", borderRadius:"16px", borderLeft:`4px solid ${col||c}`, boxShadow:"0 2px 16px rgba(0,0,0,0.06)", marginBottom:"18px" });
  const ROW = { display:"flex", gap:"10px", flexWrap:"wrap", alignItems:"center" };
  const DIVIDER = { height:"1px", background:"#ECEAE6", margin:"18px 0" };
  const OVERLAY = { position:"fixed", inset:0, display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)", zIndex:100, flexDirection:"column", gap:"12px", animation:"pop 0.35s ease forwards" };

  const isGrounding = typeof mode==="string"&&mode.startsWith("grounding_");
  const groundText  = isGrounding?mode.replace("grounding_",""):"";

  // ── RENDER ────────────────────────────────────────────────
  return (
    <div style={appStyle}>

      {/* WIN OVERLAY */}
      {win&&(
        <div style={{...OVERLAY, background:`${win.bg}F0`}}>
          <Fox mood="happy" size={130}/>
          <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(24px,6vw,30px)",color:win.color,animation:"winPop 0.4s ease forwards",textAlign:"center"}}>{win.msg}</div>
          <div style={{fontSize:"14px",color:"#888",fontWeight:"300"}}>Keep going.</div>
        </div>
      )}

      <div style={cardStyle}>

        {/* ── OPEN ─────────────────────────────────────────── */}
        {phase==="open"&&(
          <div style={{textAlign:"center",animation:"fadeIn 1s ease forwards"}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:"22px",color:"#AAAAAA",letterSpacing:"0.5px",marginBottom:"28px"}}>steadily</div>
            <Fox mood="idle" size={110}/>
            <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(16px,4vw,18px)",color:"#BBBBBB",fontStyle:"italic",marginTop:"24px"}}>{openMsg}</div>
          </div>
        )}

        {/* ── READY ────────────────────────────────────────── */}
        {phase==="ready"&&(
          <div style={{textAlign:"center",animation:"slideUp 0.5s ease forwards"}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:"22px",color:"#AAAAAA",letterSpacing:"0.5px",marginBottom:"28px"}}>steadily</div>
            <Fox mood="idle" size={110}/>
            <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(18px,4.5vw,21px)",color:"#1C1C1C",margin:"24px 0 8px"}}>Tap when you're ready.</div>
            <div style={{fontSize:"13px",color:"#CCCCCC",marginBottom:"32px"}}>No rush.</div>
            {saved?(
              <div>
                <div style={{background:"white",border:"1.5px solid #E8E4DE",borderRadius:"14px",padding:"16px",marginBottom:"16px",textAlign:"left"}}>
                  <span style={LBL}>You were working on</span>
                  {saved.activeTasks?.slice(0,2).map((t,i)=>(
                    <div key={i} style={{fontSize:"14px",color:"#555",fontWeight:"300",marginBottom:"4px",display:"flex",alignItems:"center",gap:"8px"}}>
                      <span>—</span><span style={{flex:1}}>{t.text}</span><PriBadge pkey={t.priority} small/>
                    </div>
                  ))}
                </div>
                <div style={ROW}>
                  <button style={BTN(ENERGY[saved.energy]?.color)} onClick={()=>{ setEnergy(saved.energy); setActiveTasks(saved.activeTasks||[]); setAllTasks(saved.allTasks||[]); if(saved.timer)setTimer(saved.timer); go("focus"); }}>Continue →</button>
                  <button style={GH()} onClick={()=>{ cl(); setSaved(null); go("checkin"); }}>Start fresh</button>
                </div>
              </div>
            ):(
              <button style={BTN("#1C1C1C")} onClick={()=>go("checkin")}>I'm here</button>
            )}
          </div>
        )}

        {/* ── CHECK-IN ─────────────────────────────────────── */}
        {phase==="checkin"&&(
          <div style={{animation:"slideUp 0.4s ease forwards"}}>
            <Fox mood="idle" size={100}/>
            <div style={{...T,marginTop:"20px"}}>How's your energy?</div>
            <div style={SB}>Go with your gut — no wrong answer.</div>
            <div style={{display:"flex",gap:"10px",marginBottom:"0"}}>
              {["low","okay","good"].map(lv=>(
                <button key={lv} onClick={()=>{ setEnergy(lv); go("dump-ask"); }} style={{flex:1,padding:"clamp(16px,4vw,24px) 8px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"16px",cursor:"pointer",textAlign:"center",fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s ease",minHeight:"80px"}}>
                  <div style={{fontSize:"clamp(22px,6vw,28px)",marginBottom:"8px"}}>{ENERGY[lv].emoji}</div>
                  <div style={{fontSize:"clamp(11px,3vw,13px)",color:"#999",fontWeight:"300"}}>{ENERGY[lv].label}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ── DUMP ASK ─────────────────────────────────────── */}
        {phase==="dump-ask"&&cfg&&(
          <div style={{animation:"slideUp 0.4s ease forwards"}}>
            <Fox mood="idle" size={100}/>
            <div style={{...T,marginTop:"20px"}}>Want to do a quick brain dump?</div>
            <div style={{...SB,marginBottom:"28px"}}>Empty your head first — then we'll pick what matters.</div>
            <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
              <button style={BTN(c)} onClick={()=>go("dump")}>Yes, empty my head first</button>
              <button style={GH(c)} onClick={()=>go("tasks")}>No, I know what I need to do</button>
            </div>
          </div>
        )}

        {/* ── DUMP ─────────────────────────────────────────── */}
        {phase==="dump"&&(
          <div style={{animation:"slideUp 0.4s ease forwards"}}>
            <div style={T}>What's on your mind?</div>
            <div style={SB}>Everything. Work, kids, errands, worries. No filter.</div>
            <textarea
              style={{...INP,height:"clamp(140px,30vw,180px)",resize:"none",lineHeight:"1.6",marginBottom:"16px"}}
              placeholder={"emails, Noah's cleats, project deadline, dentist appt, laundry..."}
              value={dumpText}
              onChange={e=>setDumpText(e.target.value)}
              autoFocus
            />
            <div style={ROW}>
              <button style={{...BTN(c),opacity:dumpText.trim()?1:0.35}} onClick={()=>dumpText.trim()&&parseDump()}>Done dumping →</button>
              <button style={GH()} onClick={()=>go("dump-ask")}>← Back</button>
            </div>
          </div>
        )}

        {/* ── DUMP REVIEW ──────────────────────────────────── */}
        {phase==="dump-review"&&(
          <div style={{animation:"slideUp 0.4s ease forwards"}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(18px,4.5vw,22px)",color:"#1C1C1C",marginBottom:"6px"}}>That's a lot to carry.</div>
            <div style={{...SB,marginBottom:"20px"}}>Let's make it lighter. Mark what's urgent.</div>
            <div style={{maxHeight:"clamp(200px,45vh,320px)",overflowY:"auto",marginBottom:"20px"}}>
              {dumpParsed.map(item=>(
                <div key={item.id} style={{padding:"12px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"8px"}}>
                  <div style={{fontSize:"14px",color:"#1C1C1C",fontWeight:"300",marginBottom:"10px"}}>{item.text}</div>
                  <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                    {PRIORITIES.map(p=>(
                      <button key={p.key} onClick={()=>updateParsedPri(item.id,p.key)} style={{padding:"4px 10px",borderRadius:"50px",border:`1.5px solid ${item.priority===p.key?p.color:"#E8E4DE"}`,background:item.priority===p.key?p.bg:"white",color:item.priority===p.key?p.color:"#999",fontSize:"11px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",transition:"all 0.15s ease"}}>
                        {p.label}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <button style={BTN(c)} onClick={()=>{ const suggested=suggestTasks(); setActiveTasks(suggested); go("select"); }}>
              Let's pick what to focus on →
            </button>
          </div>
        )}

        {/* ── SELECT ───────────────────────────────────────── */}
        {phase==="select"&&cfg&&(
          <div style={{animation:"slideUp 0.4s ease forwards"}}>
            <div style={T}>Pick up to {cfg.max} for today.</div>
            <div style={{...SB,marginBottom:"8px"}}>{cfg.hint}</div>
            {activeTasks.length>0&&(
              <div style={{padding:"10px 14px",background:cfg.bg,borderRadius:"10px",fontSize:"12px",color:c,marginBottom:"16px"}}>
                ✦ Based on your priorities, we suggest these. Swap any you like.
              </div>
            )}
            {/* Selected */}
            {activeTasks.map((t,i)=>(
              <div key={t.id} style={{...CARD2(PRIORITIES.find(p=>p.key===t.priority)?.color||c),display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:"14px",color:"#1C1C1C",fontWeight:"300",marginBottom:"4px"}}>{t.text}</div>
                  <PriBadge pkey={t.priority} small/>
                </div>
                <button onClick={()=>removeActive(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#CCC",fontSize:"18px",lineHeight:1,minWidth:"32px",minHeight:"32px"}}>×</button>
              </div>
            ))}
            {/* Available from dump */}
            {activeTasks.length<cfg.max&&dumpParsed.filter(d=>!activeTasks.find(a=>a.id===d.id)).length>0&&(
              <div style={{marginBottom:"16px"}}>
                <span style={LBL}>From your dump — tap to add</span>
                {dumpParsed.filter(d=>!activeTasks.find(a=>a.id===d.id)).map(item=>(
                  <button key={item.id} onClick={()=>{if(activeTasks.length<cfg.max)setActiveTasks(p=>[...p,{...item,id:mkId()}]);}} style={{display:"flex",alignItems:"center",gap:"10px",width:"100%",padding:"12px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"8px",cursor:"pointer",textAlign:"left",fontFamily:"'DM Sans',sans-serif"}}>
                    <span style={{flex:1,fontSize:"14px",color:"#555",fontWeight:"300"}}>{item.text}</span>
                    <PriBadge pkey={item.priority} small/>
                    <span style={{color:c,fontSize:"18px",fontWeight:"300"}}>+</span>
                  </button>
                ))}
              </div>
            )}
            {activeTasks.length>0&&(
              <div style={{marginTop:"8px"}}>
                <button style={BTN(c)} onClick={()=>go("timer-pick")}>Start with these →</button>
              </div>
            )}
          </div>
        )}

        {/* ── TASKS ────────────────────────────────────────── */}
        {phase==="tasks"&&cfg&&(
          <div style={{animation:"slideUp 0.4s ease forwards"}}>
            <div style={T}>What needs to happen?</div>
            <div style={SB}>Add tasks — you'll work 3 at a time.</div>

            {/* Priority picker */}
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"12px"}}>
              {PRIORITIES.map(p=>(
                <button key={p.key} onClick={()=>setTaskPri(p.key)} style={{padding:"5px 11px",borderRadius:"50px",border:`1.5px solid ${taskPri===p.key?p.color:"#E8E4DE"}`,background:taskPri===p.key?p.bg:"white",color:taskPri===p.key?p.color:"#999",fontSize:"11px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",transition:"all 0.15s ease"}}>
                  {p.label}
                </button>
              ))}
            </div>

            <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
              <input style={{...INP,flex:1}} placeholder="Add a task..." value={taskInput}
                onChange={e=>setTaskInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTask()} autoFocus/>
              <button style={{...GH(c),padding:"0 16px",fontSize:"22px",lineHeight:1,minWidth:"48px"}} onClick={addTask}>+</button>
            </div>

            {/* Active tasks (up to 3) */}
            {activeTasks.length>0&&(
              <div style={{marginBottom:"8px"}}>
                <span style={LBL}>Working on today ({activeTasks.length}/3)</span>
                {activeTasks.map((t,i)=>(
                  <div key={t.id} style={{padding:"12px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"8px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"14px",color:"#1C1C1C",fontWeight:"300",marginBottom:"4px"}}>{t.text}</div>
                        <PriBadge pkey={t.priority} small/>
                      </div>
                      <button onClick={()=>removeActive(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#CCC",fontSize:"16px",minWidth:"32px",minHeight:"32px"}}>×</button>
                    </div>
                    <button onClick={()=>openCollab(t)} style={{fontSize:"11px",color:c,background:c+"15",border:"none",borderRadius:"50px",padding:"4px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:"400"}}>
                      👥 Invite someone
                    </button>
                    {t.collab&&<span style={{fontSize:"11px",color:"#AAAAAA",marginLeft:"8px"}}>📨 {t.collab}</span>}
                  </div>
                ))}
              </div>
            )}

            {/* Queue */}
            {allTasks.length>0&&(
              <div style={{marginBottom:"8px"}}>
                <span style={LBL}>Up next ({allTasks.length})</span>
                {allTasks.map(t=>(
                  <div key={t.id} style={{padding:"10px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"6px",display:"flex",alignItems:"center",gap:"8px",opacity:0.6}}>
                    <span style={{flex:1,fontSize:"13px",color:"#555",fontWeight:"300"}}>{t.text}</span>
                    <PriBadge pkey={t.priority} small/>
                  </div>
                ))}
              </div>
            )}

            {activeTasks.length>0&&(
              <div style={{marginTop:"20px"}}>
                <button style={BTN(c)} onClick={()=>go("timer-pick")}>Start focusing →</button>
              </div>
            )}
          </div>
        )}

        {/* ── TIMER PICK ───────────────────────────────────── */}
        {phase==="timer-pick"&&cfg&&(
          <div style={{animation:"slideUp 0.4s ease forwards"}}>
            <Fox mood="idle" size={100}/>
            <div style={{...T,marginTop:"20px"}}>How long can you give?</div>
            <div style={SB}>Pick what feels honest right now.</div>
            <div style={{display:"flex",gap:"8px",marginBottom:"24px"}}>
              {TIMERS.map(t=>(
                <button key={t.label} onClick={()=>{setTimer(t);setSecs(t.secs);}} style={{flex:1,padding:"clamp(12px,3vw,16px) 8px",borderRadius:"14px",border:`1.5px solid ${timer?.label===t.label?c:"#E8E4DE"}`,background:timer?.label===t.label?c:"white",color:timer?.label===t.label?"white":"#888",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all 0.15s ease",textAlign:"center",minHeight:"70px"}}>
                  <div style={{fontSize:"clamp(13px,3.5vw,15px)",fontWeight:"500",marginBottom:"3px"}}>{t.label}</div>
                  <div style={{fontSize:"11px",opacity:.75,fontWeight:"300"}}>{t.sub}</div>
                </button>
              ))}
            </div>

            {timer&&(
              <div style={{marginBottom:"24px"}}>
                <span style={LBL}>Focus sound</span>
                <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                  {SOUNDS.map(s=>(
                    <button key={s.key} onClick={()=>{setSound(s);setSoundOn(!!s.url);}} style={{padding:"8px 13px",borderRadius:"50px",border:`1.5px solid ${sound?.key===s.key?c:"#E8E4DE"}`,background:sound?.key===s.key?c:"white",color:sound?.key===s.key?"white":"#888",fontSize:"12px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",transition:"all 0.15s ease"}}>
                      {s.label}
                    </button>
                  ))}
                </div>
              </div>
            )}

            <button style={{...BTN(c),opacity:timer?1:0.35}} onClick={startFocus}>Start →</button>
          </div>
        )}

        {/* ── FOCUS ────────────────────────────────────────── */}
        {phase==="focus"&&(activeTasks.length>0||["addmore","nextup"].includes(mode))&&(
          <div style={{animation:"slideUp 0.4s ease forwards"}}>

            {/* BREAK */}
            {mode==="break"&&(
              <div style={{textAlign:"center"}}>
                <Fox mood="idle" size={110}/>
                <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(26px,7vw,32px)",color:"#1C1C1C",margin:"20px 0 6px"}}>
                  {String(Math.floor(breakSecs/60)).padStart(2,"0")}:{String(breakSecs%60).padStart(2,"0")}
                </div>
                <div style={{fontSize:"14px",color:"#BBBBBB",fontWeight:"300",marginBottom:"28px"}}>Step away. Rest.</div>
                <button style={GH()} onClick={()=>{ clearInterval(breakRef.current); setBreakRun(false); setMode(null); setSecs(timer?.secs||1500); setTimerDone(false); }}>I'm back</button>
              </div>
            )}

            {/* INTERRUPTED */}
            {mode==="interrupted"&&(
              <div style={{textAlign:"center"}}>
                <Fox mood="idle" size={110}/>
                <div style={{fontSize:"14px",color:"#BBBBBB",fontWeight:"300",margin:"20px 0 16px"}}>Someone needed you. That's okay.</div>
                {currentTask&&<div style={CARD2(focusColor)}><div style={{fontFamily:"'Lora',serif",fontSize:"17px",color:"#1C1C1C"}}>{currentTask.text}</div></div>}
                <button style={BTN(focusColor)} onClick={()=>{setMode(null);setRunning(true);if(sound?.url&&soundOn)resumeSound();}}>I'm back →</button>
              </div>
            )}

            {/* GROUNDING */}
            {isGrounding&&(
              <div style={{textAlign:"center",animation:"slideUp 0.4s ease forwards"}}>
                <Fox mood="idle" size={110}/>
                <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(18px,4.5vw,22px)",color:"#1C1C1C",margin:"24px 0 8px",lineHeight:"1.5"}}>{groundText}</div>
                <div style={{fontSize:"13px",color:"#CCCCCC",marginBottom:"32px"}}>Take your time.</div>
                <div style={ROW}>
                  <button style={BTN(focusColor)} onClick={()=>{setMode(null);setRunning(true);if(sound?.url&&soundOn)resumeSound();}}>Ready →</button>
                  <button style={GH()} onClick={()=>{ setBreakSecs(2*60); setBreakRun(true); setMode("break"); }}>Need a break</button>
                </div>
              </div>
            )}

            {/* POST TIMER */}
            {mode==="posttimer"&&(
              <div style={{textAlign:"center",animation:"slideUp 0.4s ease forwards"}}>
                <CircleTimer seconds={0} total={timer?.secs||1500} color={focusColor} done/>
                <Fox mood="idle" size={100}/>
                <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(18px,4.5vw,20px)",color:"#1C1C1C",margin:"16px 0 6px"}}>Timer's done.</div>
                <div style={{fontSize:"14px",color:"#BBBBBB",marginBottom:"24px"}}>How are you feeling?</div>
                <div style={ROW}>
                  <button style={BTN(focusColor)} onClick={()=>{setMode(null);setSecs(timer?.secs||1500);setRunning(true);setTimerDone(false);if(sound?.url&&soundOn)resumeSound();}}>Keep going</button>
                  <button style={GH()} onClick={()=>{setBreakSecs(5*60);setBreakRun(true);setMode("break");}}>Take a break</button>
                </div>
              </div>
            )}

            {/* COLLABORATOR INVITE */}
            {mode==="collab"&&collabTask&&(
              <div style={{animation:"slideUp 0.4s ease forwards"}}>
                {!collabSent ? (
                  <>
                    <div style={T}>Invite someone</div>
                    <div style={{...SB,marginBottom:"20px"}}>They'll get a message about this task.</div>

                    {/* Task preview */}
                    <div style={{padding:"14px 16px",background:c+"12",borderRadius:"12px",marginBottom:"20px",borderLeft:`3px solid ${c}`}}>
                      <div style={{fontSize:"13px",color:c,fontWeight:"500",marginBottom:"3px"}}>Task</div>
                      <div style={{fontSize:"15px",color:"#1C1C1C",fontFamily:"'Lora',serif"}}>{collabTask.text}</div>
                    </div>

                    {/* Your name */}
                    {!userName&&(
                      <div style={{marginBottom:"14px"}}>
                        <span style={LBL}>Your name</span>
                        <input style={{...INP}} placeholder="So they know it's from you..." value={userName}
                          onChange={e=>setUserName(e.target.value)}/>
                      </div>
                    )}

                    {/* Collaborator name */}
                    <div style={{marginBottom:"14px"}}>
                      <span style={LBL}>Their name</span>
                      <input style={{...INP}} placeholder="Noah, Mom, Alex..." value={collabName}
                        onChange={e=>setCollabName(e.target.value)} autoFocus/>
                    </div>

                    {/* Due date & time */}
                    <div style={{display:"flex",gap:"10px",marginBottom:"20px"}}>
                      <div style={{flex:1}}>
                        <span style={LBL}>Due date</span>
                        <input type="date" style={{...INP}} value={collabDue} onChange={e=>setCollabDue(e.target.value)}
                          min={new Date().toISOString().split("T")[0]}/>
                      </div>
                      <div style={{flex:1}}>
                        <span style={LBL}>Time</span>
                        <input type="time" style={{...INP}} value={collabTime} onChange={e=>setCollabTime(e.target.value)}/>
                      </div>
                    </div>

                    {/* Preview */}
                    <div style={{padding:"14px 16px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"20px"}}>
                      <div style={{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:"#BBBBBB",marginBottom:"8px"}}>Message preview</div>
                      <div style={{fontSize:"13px",color:"#555",fontWeight:"300",lineHeight:"1.7"}}>
                        Hey {collabName||"there"}! 👋<br/>
                        <br/>
                        {userName||"Someone"} invited you to:<br/>
                        <strong style={{color:"#1C1C1C"}}>"{collabTask.text}"</strong>
                        {collabDue&&<><br/>Due: {new Date(collabDue+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}{collabTime&&" at "+new Date("2000-01-01T"+collabTime).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</>}
                        <br/><br/>
                        Opened with Steadily 🐬
                      </div>
                    </div>

                    <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
                      <button style={BTN(c)} onClick={sendCollab}>Send invite 🐬</button>
                      <button style={GH()} onClick={()=>setMode(null)}>Cancel</button>
                    </div>
                  </>
                ) : (
                  <div style={{textAlign:"center",animation:"slideUp 0.4s ease forwards"}}>
                    <Fox mood="happy" size={110}/>
                    <div style={{fontFamily:"'Lora',serif",fontSize:"22px",color:c,margin:"20px 0 8px"}}>Invite sent!</div>
                    <div style={{fontSize:"14px",color:"#AAAAAA",marginBottom:"28px"}}>
                      {collabName||"They"} knows about this task now.
                    </div>
                    <button style={BTN(c)} onClick={()=>{
                      setActiveTasks(p=>p.map(t=>t.id===collabTask.id?{...t,collab:collabName||"Someone"}:t));
                      setMode(null); setCollabSent(false);
                    }}>Back to tasks →</button>
                  </div>
                )}
              </div>
            )}

            {/* DIDN'T DO IT */}
            {mode==="didnt"&&(
              <div style={{animation:"slideUp 0.4s ease forwards"}}>
                <div style={T}>What's going on?</div>
                <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"16px"}}>
                  {[
                    {key:"breakdown",label:"It's too much",desc:"Break it into smaller steps"},
                    {key:"avoidance",label:"I'm avoiding it",desc:"Let's work with that feeling"},
                    {key:"defer",label:"Not today",desc:"Set it aside for another day"},
                  ].map(opt=>(
                    <button key={opt.key} style={{padding:"16px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",cursor:"pointer",textAlign:"left",fontFamily:"'DM Sans',sans-serif"}}
                      onClick={()=>{ if(opt.key==="breakdown") setSubTip(BREAKDOWN_TIPS[Math.floor(Math.random()*BREAKDOWN_TIPS.length)]); setMode(opt.key); }}>
                      <div style={{fontSize:"15px",color:"#1C1C1C",fontWeight:"400",marginBottom:"3px"}}>{opt.label}</div>
                      <div style={{fontSize:"12px",color:"#AAA",fontWeight:"300"}}>{opt.desc}</div>
                    </button>
                  ))}
                </div>
                <button style={GH()} onClick={()=>setMode(null)}>← Back</button>
              </div>
            )}

            {/* AVOIDANCE */}
            {mode==="avoidance"&&(
              <div style={{animation:"slideUp 0.4s ease forwards"}}>
                <div style={T}>That's information,<br/>not failure.</div>
                <div style={{...SB,marginBottom:"16px"}}>Avoidance usually means the task feels too big or too uncertain. That's a signal worth listening to.</div>
                <div style={{fontFamily:"'Lora',serif",fontSize:"16px",color:"#1C1C1C",padding:"18px",background:"white",borderRadius:"12px",borderLeft:`3px solid ${focusColor}`,marginBottom:"20px",lineHeight:"1.6"}}>
                  The only move that works: <strong>the first 2 minutes.</strong> Don't think about finishing it.
                </div>
                <div style={ROW}>
                  <button style={BTN(focusColor)} onClick={()=>{setMode(null);setTimer({label:"2 min",secs:120});setSecs(120);setRunning(true);setTimerDone(false);}}>Start 2 min →</button>
                  <button style={GH()} onClick={()=>setMode("defer")}>Not today</button>
                </div>
              </div>
            )}

            {/* BREAKDOWN */}
            {mode==="breakdown"&&(
              <div style={{animation:"slideUp 0.4s ease forwards"}}>
                <div style={T}>Break it down.</div>
                {/* Meaningful tip */}
                <div style={{padding:"14px 16px",background:focusColor+"15",borderRadius:"12px",marginBottom:"16px",borderLeft:`3px solid ${focusColor}`}}>
                  <div style={{fontSize:"10px",letterSpacing:"2px",textTransform:"uppercase",color:focusColor,marginBottom:"6px",fontWeight:"500"}}>How to chunk it</div>
                  <div style={{fontSize:"13px",color:"#555",fontWeight:"300",lineHeight:"1.7"}}>{subTip}</div>
                  <div style={{marginTop:"8px",fontSize:"12px",color:"#AAA",lineHeight:"1.6"}}>
                    ✦ Each step: one physical action, 5–15 min max.<br/>
                    ✦ If it still feels heavy, it's two steps.
                  </div>
                </div>
                <div style={{fontSize:"13px",color:"#AAA",marginBottom:"10px"}}>Break <em style={{color:"#888"}}>"{currentTask?.text}"</em> into up to 3 steps:</div>
                {subtasks.map((s,i)=>(
                  <div key={i} style={{padding:"12px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"8px",display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{color:focusColor,fontSize:"11px",fontWeight:"500",minWidth:"16px"}}>{i+1}</span>
                    <span style={{flex:1,fontSize:"14px",fontWeight:"300"}}>{s}</span>
                    <button onClick={()=>setSubtasks(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"#CCC",fontSize:"16px",minWidth:"28px"}}>×</button>
                  </div>
                ))}
                {subtasks.length<3&&(
                  <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
                    <input style={{...INP,flex:1,fontSize:"14px"}} placeholder={subtasks.length===0?"First small step...":"Next step..."} value={subInput}
                      onChange={e=>setSubInput(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&subInput.trim()&&subtasks.length<3){setSubtasks(p=>[...p,subInput.trim()]);setSubInput("");} }} autoFocus/>
                    <button style={{...GH(focusColor),padding:"0 14px",fontSize:"22px",minWidth:"48px"}} onClick={()=>{if(subInput.trim()&&subtasks.length<3){setSubtasks(p=>[...p,subInput.trim()]);setSubInput("");}}}>+</button>
                  </div>
                )}
                {subtasks.length===3&&<div style={{fontSize:"12px",color:"#BBBBBB",marginBottom:"12px"}}>That's enough steps.</div>}
                <div style={ROW}>
                  {subtasks.length>0&&<button style={BTN(focusColor)} onClick={confirmBreakdown}>Start step 1 →</button>}
                  <button style={GH()} onClick={()=>{setMode(null);setSubtasks([]);setSubInput("");}}>Cancel</button>
                </div>
              </div>
            )}

            {/* DEFER */}
            {mode==="defer"&&(
              <div style={{animation:"slideUp 0.4s ease forwards"}}>
                <div style={T}>When should this come back?</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"14px"}}>
                  {[1,2,3,7].map(n=>{
                    const d=new Date(); d.setDate(d.getDate()+n);
                    const val=d.toISOString().split("T")[0];
                    const lbl2=n===1?"Tomorrow":n===7?"Next week":d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
                    return <button key={val} onClick={()=>setDeferDate(val)} style={{padding:"10px 16px",borderRadius:"50px",border:`1.5px solid ${deferDate===val?focusColor:"#E8E4DE"}`,background:deferDate===val?focusColor:"white",color:deferDate===val?"white":"#666",fontSize:"13px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",transition:"all 0.15s ease",minHeight:"40px"}}>{lbl2}</button>;
                  })}
                </div>
                <input type="date" style={{...INP,marginBottom:"16px"}} value={deferDate} onChange={e=>setDeferDate(e.target.value)} min={new Date(Date.now()+86400000).toISOString().split("T")[0]}/>
                <div style={ROW}>
                  <button style={{...BTN(focusColor),opacity:deferDate?1:0.35}} onClick={confirmDefer}>Set aside →</button>
                  <button style={GH()} onClick={()=>{setMode(null);setDeferDate("");}}>Cancel</button>
                </div>
              </div>
            )}

            {/* NEXT UP — active tasks done, queue has more */}
            {mode==="nextup"&&(
              <div style={{textAlign:"center",animation:"slideUp 0.4s ease forwards"}}>
                <Fox mood="happy" size={120}/>
                <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(20px,5vw,24px)",color:c,margin:"20px 0 8px"}}>Nice work.</div>
                <div style={{fontSize:"14px",color:"#888",marginBottom:"24px"}}>You've got {allTasks.length} more in your queue. Keep going?</div>
                <div style={{maxHeight:"180px",overflowY:"auto",marginBottom:"20px"}}>
                  {allTasks.slice(0,3).map(t=>(
                    <button key={t.id} onClick={()=>promoteFromQueue(t)} style={{display:"flex",alignItems:"center",gap:"10px",width:"100%",padding:"12px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"8px",cursor:"pointer",textAlign:"left",fontFamily:"'DM Sans',sans-serif"}}>
                      <span style={{flex:1,fontSize:"14px",color:"#555",fontWeight:"300"}}>{t.text}</span>
                      <PriBadge pkey={t.priority} small/>
                      <span style={{color:c,fontSize:"16px"}}>+</span>
                    </button>
                  ))}
                </div>
                <div style={ROW}>
                  <button style={BTN(c)} onClick={()=>{if(activeTasks.length>0){setMode(null);setSecs(timer?.secs||1500);setRunning(true);}}} disabled={activeTasks.length===0}>
                    {activeTasks.length>0?"Start next →":"Pick a task first"}
                  </button>
                  <button style={GH()} onClick={()=>{cl();go("done");}}>I'm done for today</button>
                </div>
              </div>
            )}

            {/* ADD MORE */}
            {mode==="addmore"&&(
              <div style={{textAlign:"center",animation:"slideUp 0.4s ease forwards"}}>
                <Fox mood="happy" size={120}/>
                <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(20px,5vw,24px)",color:c,margin:"20px 0 8px"}}>You're in a good flow.</div>
                <div style={{fontSize:"14px",color:"#BBBBBB",marginBottom:"24px"}}>Want to add one more thing?</div>
                <div style={{display:"flex",gap:"8px",marginBottom:"20px",textAlign:"left"}}>
                  <input style={{...INP,flex:1,fontSize:"16px"}} placeholder="One more task..." value={addMoreInput}
                    onChange={e=>setAddMoreInput(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter"&&addMoreInput.trim()){ setActiveTasks([{id:mkId(),text:addMoreInput.trim(),priority:"should"}]); setAddMoreInput(""); setMode("grounding_"+GROUNDS[Math.floor(Math.random()*GROUNDS.length)]); } }}
                    autoFocus/>
                  <button style={{...GH(c),padding:"0 14px",fontSize:"22px",minWidth:"48px"}} onClick={()=>{if(!addMoreInput.trim())return; setActiveTasks([{id:mkId(),text:addMoreInput.trim(),priority:"should"}]); setAddMoreInput(""); setMode("grounding_"+GROUNDS[Math.floor(Math.random()*GROUNDS.length)]); }}>+</button>
                </div>
                <button style={GH()} onClick={()=>{cl();go("done");}}>No, I'm done for now</button>
              </div>
            )}

            {/* MAIN FOCUS */}
            {!mode&&!isGrounding&&currentTask&&(
              <>
                {/* Body double */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    <div style={{width:7,height:7,borderRadius:"50%",background:focusColor,animation:"pulse 2.5s ease-in-out infinite",flexShrink:0}}/>
                    <span style={{fontSize:"12px",color:focusColor,fontWeight:"300"}}>You're not doing this alone.</span>
                  </div>
                  {sound&&sound.key!=="none"&&(
                    <button onClick={()=>{
                      if(soundOn){pauseSound();setSoundOn(false);}
                      else if(sound?.url){resumeSound()||playSound(sound.url);setSoundOn(true);}
                    }} style={{background:"none",border:"none",fontSize:"18px",cursor:"pointer",opacity:soundOn?1:0.4,minWidth:"36px",minHeight:"36px"}}>
                      {soundOn?"🔊":"🔇"}
                    </button>
                  )}
                </div>

                <CircleTimer seconds={secs} total={timer?.secs||1500} color={focusColor} done={timerDone}/>

                <div style={{display:"flex",justifyContent:"center",gap:"10px",marginBottom:"24px"}}>
                  {!running&&!timerDone&&<button onClick={()=>{setRunning(true);if(sound?.url&&soundOn)resumeSound();else if(sound?.url){playSound(sound.url);setSoundOn(true);}}} style={GH(focusColor)}>{secs===(timer?.secs||1500)?"▶ Start":"▶ Resume"}</button>}
                  {running&&<button onClick={()=>{setRunning(false);pauseSound();}} style={GH(focusColor)}>⏸ Pause</button>}
                  {(running||secs<(timer?.secs||1500))&&<button onClick={()=>{setSecs(timer?.secs||1500);setRunning(false);setTimerDone(false);stopSound();setSoundOn(false);}} style={{background:"none",border:"none",fontSize:"12px",color:"#CCCCCC",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:"36px"}}>↺</button>}
                </div>

                {!running&&!timerDone&&secs<(timer?.secs||1500)&&secs>0&&(
                  <div style={{fontSize:"12px",color:"#CCCCCC",textAlign:"center",marginBottom:"14px"}}>Pick up where you left off.</div>
                )}

                {/* Task card */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"6px"}}>
                  <span style={LBL}>Right now</span>
                  {subGroup&&<span style={{fontSize:"11px",color:focusColor,fontWeight:"500"}}>Step {subGroup.current} of {subGroup.total}</span>}
                </div>
                <div style={{...CARD2(focusColor),position:"relative"}}>
                  <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(16px,4vw,18px)",color:"#1C1C1C",lineHeight:"1.55",marginBottom:"8px"}}>{currentTask.text}</div>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",flexWrap:"wrap"}}>
                    <PriBadge pkey={currentTask.priority} small/>
                    {currentTask.collab
                      ? <span style={{fontSize:"11px",color:"#AAAAAA"}}>👥 {currentTask.collab}</span>
                      : <button onClick={()=>openCollab(currentTask)} style={{fontSize:"11px",color:focusColor,background:focusColor+"15",border:"none",borderRadius:"50px",padding:"3px 10px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>👥 Invite</button>
                    }
                  </div>
                </div>

                <div style={{...ROW,marginBottom:"14px"}}>
                  <button style={BTN(focusColor)} onClick={completeTask}>Done ✓</button>
                  <button style={GH()} onClick={()=>setMode("didnt")}>Not yet</button>
                </div>

                <button onClick={()=>{clearInterval(tickRef.current);setRunning(false);stopSound();setSoundOn(false);setMode("interrupted");}} style={{background:"none",border:"none",fontSize:"12px",color:"#CCCCCC",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"block",marginBottom:"16px",minHeight:"36px"}}>
                  got interrupted
                </button>

                {activeTasks.length>1&&(
                  <div style={{fontSize:"12px",color:"#CCCCCC",cursor:"pointer",minHeight:"36px",display:"flex",alignItems:"center"}} onClick={()=>setMode("later")}>
                    + {activeTasks.length-1} more later
                  </div>
                )}
              </>
            )}

            {/* LATER */}
            {mode==="later"&&(
              <div>
                <span style={LBL}>Coming up</span>
                {activeTasks.slice(1).map((t,i)=>(
                  <div key={t.id} style={{padding:"12px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"8px",opacity:0.6,display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{flex:1,fontSize:"14px",color:"#555",fontWeight:"300"}}>{t.text}</span>
                    <PriBadge pkey={t.priority} small/>
                  </div>
                ))}
                <button style={{...GH(),marginTop:"8px"}} onClick={()=>setMode(null)}>← Back</button>
              </div>
            )}
          </div>
        )}

        {/* ── DONE ─────────────────────────────────────────── */}
        {phase==="done"&&(
          <div style={{textAlign:"center",animation:"slideUp 0.4s ease forwards"}}>
            <Fox mood="happy" size={130}/>
            <div style={{fontFamily:"'Lora',serif",fontSize:"clamp(22px,5.5vw,26px)",color:"#1C1C1C",margin:"20px 0 6px"}}>That's enough.</div>
            <div style={{fontSize:"14px",color:"#BBBBBB",marginBottom:"6px"}}>You can stop here.</div>
            <div style={{fontSize:"13px",color:c,marginBottom:"28px"}}>{doneTasks.length} {doneTasks.length===1?"thing":"things"} done. That's not nothing.</div>
            {doneTasks.length>0&&(
              <div style={{textAlign:"left",marginBottom:"24px"}}>
                <span style={LBL}>What you did</span>
                {doneTasks.map((t,i)=>(
                  <div key={i} style={{padding:"10px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"6px",display:"flex",alignItems:"center",gap:"8px"}}>
                    <span style={{color:"#A8C5A0",fontSize:"14px"}}>✓</span>
                    <span style={{flex:1,fontSize:"13px",color:"#555",fontWeight:"300"}}>{t.text}</span>
                    <PriBadge pkey={t.priority} small/>
                  </div>
                ))}
              </div>
            )}
            {deferred.length>0&&(
              <div style={{textAlign:"left",marginBottom:"24px"}}>
                <span style={LBL}>Set aside</span>
                {deferred.map((d,i)=>(
                  <div key={i} style={{padding:"10px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"6px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:"13px",color:"#888",fontWeight:"300"}}>{d.text}</span>
                    <span style={{fontSize:"11px",color:"#CCCCCC",marginLeft:"10px",whiteSpace:"nowrap"}}>{new Date(d.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
                  </div>
                ))}
              </div>
            )}
            <button style={GH()} onClick={resetApp}>Tomorrow →</button>
          </div>
        )}

      </div>

      {/* SKIP */}
      {showSkip&&["open","ready"].includes(phase)&&(
        <button style={{position:"fixed",bottom:"max(24px,env(safe-area-inset-bottom,24px))",right:"24px",background:"none",border:"none",fontSize:"11px",color:"#CCCCCC",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",animation:"fadeIn 0.5s ease forwards",minHeight:"44px",minWidth:"44px"}}
          onClick={()=>{clearTimeout(entryRef.current);saved?setPhase("ready"):go("checkin");}}>
          skip
        </button>
      )}

      {/* DUMP ICON */}
      {!["open","ready","checkin","dump-ask","dump","dump-review"].includes(phase)&&!dumpOpen&&(
        <button onClick={()=>setDumpOpen(true)} style={{position:"fixed",bottom:"max(24px,env(safe-area-inset-bottom,24px))",right:"24px",width:"50px",height:"50px",borderRadius:"50%",background:"white",border:"1.5px solid #E8E4DE",boxShadow:"0 3px 16px rgba(0,0,0,0.1)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",animation:"fadeIn 0.4s ease forwards"}}>
          📥
          {dumpItems.length>0&&<div style={{position:"absolute",top:"2px",right:"2px",width:"16px",height:"16px",borderRadius:"50%",background:c,fontSize:"9px",color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif",fontWeight:"500"}}>{dumpItems.length>9?"9+":dumpItems.length}</div>}
        </button>
      )}

      {/* DUMP DRAWER */}
      {dumpOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.2)",zIndex:200,display:"flex",alignItems:"flex-end",animation:"fadeIn 0.2s ease forwards"}}
          onClick={e=>{if(e.target===e.currentTarget)setDumpOpen(false);}}>
          <div style={{width:"100%",maxHeight:"80vh",background:"#F9F8F6",borderRadius:"20px 20px 0 0",padding:"20px 20px max(32px,env(safe-area-inset-bottom,32px))",overflowY:"auto",animation:"slideUp 0.3s ease forwards"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
              <div style={{fontFamily:"'Lora',serif",fontSize:"20px",color:"#1C1C1C"}}>Brain dump</div>
              <button onClick={()=>setDumpOpen(false)} style={{background:"none",border:"none",fontSize:"22px",color:"#CCCCCC",cursor:"pointer",minWidth:"44px",minHeight:"44px",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
            </div>
            <div style={{fontSize:"13px",color:"#BBBBBB",marginBottom:"16px"}}>Park anything here. It won't disappear.</div>
            <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
              <input style={{...INP,flex:1,fontSize:"16px"}} placeholder="What's on your mind?" value={dumpInput}
                onChange={e=>setDumpInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&dumpInput.trim()){setDumpItems(p=>[{text:dumpInput.trim(),id:Date.now(),priority:"should"},...p]);setDumpInput("");}}} autoFocus/>
              <button style={{...BTN(c),padding:"0 16px",fontSize:"22px",minWidth:"48px"}} onClick={()=>{if(dumpInput.trim()){setDumpItems(p=>[{text:dumpInput.trim(),id:Date.now(),priority:"should"},...p]);setDumpInput("");}}}>+</button>
            </div>
            {dumpItems.length===0&&<div style={{fontSize:"13px",color:"#CCCCCC",textAlign:"center",padding:"20px 0"}}>Nothing here yet. Add anything.</div>}
            {dumpItems.map(item=>(
              <div key={item.id} style={{padding:"12px 14px",background:"white",border:"1.5px solid #E8E4DE",borderRadius:"12px",marginBottom:"8px"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}}>
                  <span style={{flex:1,fontSize:"14px",color:"#1C1C1C",fontWeight:"300"}}>{item.text}</span>
                  <button onClick={()=>setDumpItems(p=>p.filter(i=>i.id!==item.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#CCC",fontSize:"16px",minWidth:"32px",minHeight:"32px"}}>×</button>
                </div>
                <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
                  {PRIORITIES.map(p=>(
                    <button key={p.key} onClick={()=>setDumpItems(prev=>prev.map(i=>i.id===item.id?{...i,priority:p.key}:i))} style={{padding:"3px 9px",borderRadius:"50px",border:`1.5px solid ${item.priority===p.key?p.color:"#E8E4DE"}`,background:item.priority===p.key?p.bg:"white",color:item.priority===p.key?p.color:"#999",fontSize:"10px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}>
                      {p.label}
                    </button>
                  ))}
                  {["tasks","focus","select"].includes(phase)&&activeTasks.length<3&&(
                    <button onClick={()=>promoteFromDump(item)} style={{padding:"3px 10px",borderRadius:"50px",background:c+"18",border:"none",color:c,fontSize:"10px",fontFamily:"'DM Sans',sans-serif",cursor:"pointer",fontWeight:"500"}}>do today</button>
                  )}
                </div>
              </div>
            ))}
            {dumpItems.length>0&&<button onClick={()=>{if(window.confirm("Clear everything?"))setDumpItems([]);}} style={{background:"none",border:"none",fontSize:"12px",color:"#CCCCCC",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginTop:"12px",minHeight:"36px"}}>Clear all</button>}
          </div>
        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Steadily/>);
</script>
</body>
</html>
